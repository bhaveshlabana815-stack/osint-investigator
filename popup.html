<!DOCTYPE html>

<html>
<head>
<title>OSINT Investigator</title>
<style>

body{
width:350px;
font-family:Arial;
background:#0f172a;
color:white;
padding:10px;
}

button{
background:#22c55e;
border:none;
padding:8px;
margin-top:5px;
cursor:pointer;
color:white;
font-weight:bold;
width:100%;
}

button:hover

.section{
margin-top:10px;
padding:8px;
background:#1e293b;
border-radius:5px;
}

pre{
white-space:pre-wrap;
word-wrap:break-word;
font-size:12px;
}

h3{
margin:5px 0;
color:#38bdf8;
}

</style>
</head>

<body>

<h2>OSINT Investigator</h2>

<button id="scan">Scan Website</button>

<div class="section">
<h3>Target Domain</h3>
<span id="domain">-</span>
</div>

<div class="section">
<h3>IP Information</h3>
IP: <span id="ip">-</span><br>
ISP: <span id="isp">-</span><br>
Org: <span id="org">-</span><br>
Country: <span id="country">-</span>
</div>

<div class="section">
<h3>Subdomains</h3>
<pre id="subdomains">Scanning...</pre>
</div>

<div class="section">
<h3>DNS Records</h3>
<pre id="dns">Scanning...</pre>
</div>

<div class="section">
<h3>Security Tools</h3>

<button id="shodan">Search Shodan</button>
<button id="nmap">Nmap Scan</button>
<button id="virustotal">Check VirusTotal</button>

</div>

<script src="popup.js"></script>

</body>
</html>
